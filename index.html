<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Dawn Zhang</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1BVMRGGPFY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-1BVMRGGPFY');
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        
        header {
            position: absolute; 
            width: 100%;
            z-index: 1000;
            background: transparent !important;
            border: none !important;
        }

      
        .hero {
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('home.JPG');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .hero-content h1 {
            font-size: 4rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .hero-content .subtitle {
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.6;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
            60% {transform: translateX(-50%) translateY(-5px);}
        }

        main {
            padding: 80px 0;
        }
    </style>
</head>
<body>

    <header>
        <nav class="container">
            <div class="logo" style="color: white;">DAWN.</div>
            <ul class="nav-links">
                <li><a href="index.html" class="active" style="color: white;">Home</a></li>
                <li><a href="about.html" style="color: white;">About</a></li>
                <li><a href="projects.html" style="color: white;">Gallery</a></li>
                <li><a href="contact.html" style="color: white;">Contact</a></li>
            </ul>
            <button id="theme-toggle">🌓</button>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Dawn <span class="highlight">Zhang</span></h1>
            <p class="subtitle">Photography Portfolio</p>
        </div>
        <div class="scroll-hint">SCROLL TO EXPLORE ↓</div>
    </section>

    <main class="container">
        <section class="contact-header">
            <h1>Get In <span class="highlight">Touch</span></h1>
            <p>Have a project in mind or just want to say hi?</p>
        </section>

        <div class="contact-wrapper">
            <section class="contact-form-section">
                <form action="https://formspree.io/f/mgorzylv" method="POST" id="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Your Email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="Tell me about your project..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </section>

            <section class="contact-info">
                <h3>Find Me</h3>
                <div class="map-container" style="margin-top: 20px;">
                    <iframe 
                       src="https://maps.google.com/maps?q=California%20Institute%20of%20the%20Arts&hl=en&z=15&output=embed" 
                       width="100%" 
                       height="350" 
                       style="border:0; border-radius: 12px;" 
                       allowfullscreen="" 
                       loading="lazy" 
                       referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© <span id="year">2026</span> Dawn Zhang. All rights reserved.</p>
            <nav class="footer-nav">
                <a href="privacy.html">Privacy Policy</a> | <a href="terms.html">Terms of Service</a>
            </nav>
        </div>
    </footer>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
     
        const themeBtn = document.getElementById('theme-toggle');
        const body = document.body;
        if (localStorage.getItem('theme') === 'dark') body.classList.add('dark-mode');
        if (themeBtn) {
            themeBtn.onclick = function() {
                body.classList.toggle('dark-mode');
                localStorage.setItem('theme', body.classList.contains('dark-mode') ? 'dark' : 'light');
            }
        }

    
        const yearSpan = document.getElementById('year');
        if (yearSpan) yearSpan.textContent = new Date().getFullYear();
    });
    </script>
</body>
</html>
